name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the pain point or limitation
      placeholder: It's hard to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: It would be great if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Use case, examples, or screenshots

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - nice to have
        - important
        - critical
