name: Bug report
description: Report something that is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the issue
      placeholder: Something is broken...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: It should have...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Include relevant logs, traces, or screenshots if available

  - type: input
    id: environment
    attributes:
      label: Environment
      description: e.g. OS, browser, SDK version, etc.
      placeholder: macOS + Chrome, Node 20, etc.

  - type: input
    id: version
    attributes:
      label: to11 version
      placeholder: e.g. v0.3.1 or cloud

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - blocking
        - high
        - medium
        - low
